<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Upload Image</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            padding: 30px;
        }

        .container {
            background-color: white;
            max-width: 400px;
            margin: auto;
            padding: 20px;
            border: 1px solid #ccc;
            text-align: center;
        }

        h2 {
            margin-top: 0;
        }

        form {
            margin-top: 15px;
        }

        button {
            margin-top: 10px;
            padding: 8px 15px;
            font-size: 14px;
            background-color: #4CAF50;
            color: white;
            border: none;
        }

        button:hover {
            cursor: pointer;
            background-color: #45a049;
        }
    </style>
</head>

<body>

    <div class="container">
        <h2>Upload an Image</h2>

        <form method="POST" enctype="multipart/form-data">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit">Upload</button>
        </form>
    </div>

</body>
</html>
