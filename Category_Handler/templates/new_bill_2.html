{% load custom_tags %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Edit Bill</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            padding: 30px;
        }

        .container {
            background-color: white;
            max-width: 450px;
            margin: auto;
            padding: 20px;
            border: 1px solid #ccc;
            text-align: center;
        }

        h2 {
            margin-top: 0;
        }

        form {
            margin-top: 15px;
        }

        button {
            margin-top: 10px;
            padding: 8px 15px;
            font-size: 14px;
            background-color: #2196F3;
            color: white;
            border: none;
        }

        button:hover {
            background-color: #1976d2;
            cursor: pointer;
        }

        .back {
            margin-top: 15px;
        }

        .back a {
            text-decoration: none;
            color: #555;
        }

        .back a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>

    <div class="container">
        <h2>Edit Bill</h2>

        <form method="POST" enctype="multipart/form-data">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit">Save Changes</button>
        </form>

        <div class="back">
            {% clean_edit_link name %}
        </div>
    </div>

</body>
</html>
