
{% load static %}
<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Choose Category</title>
  <link rel="stylesheet" href="{% static 'css/choose_name.css' %}">
</head>

<body>
  <div class="container">
    <h2>Choose a Category Name</h2>

    <form method="POST">
      {% csrf_token %}
      {{ form.non_field_errors }}

      <div class="field">
        {{ form.name.label_tag }}
        {{ form.name }}

        {% for error in form.name.errors %}
          <p class="error">{{ error }}</p>
        {% endfor %}
      </div>

      <button type="submit">Continue</button>
    </form>
  </div>
</body>

</html>
