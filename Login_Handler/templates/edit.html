<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Categories</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f8;
            padding: 30px;
        }

        .container {
            background-color: white;
            max-width: 600px;
            margin: auto;
            padding: 20px;
            border: 1px solid #ccc;
        }

        .top-link {
            display: inline-block;
            margin-bottom: 15px;
            text-decoration: none;
            color: #333;
        }

        .top-link:hover {
            text-decoration: underline;
        }

        ul {
            list-style-type: none;
            padding-left: 0;
        }

        li {
            padding: 10px;
            border-bottom: 1px solid #ddd;
        }

        li:last-child {
            border-bottom: none;
        }

        .action-link {
            margin-right: 15px;
            text-decoration: none;
            color: #0066cc;
        }

        .action-link:hover {
            text-decoration: underline;
        }

        .add-link {
            display: inline-block;
            margin-top: 20px;
            text-decoration: none;
            color: white;
            background-color: #4CAF50;
            padding: 8px 12px;
            border-radius: 4px;
        }

        .add-link:hover {
            background-color: #45a049;
        }
    </style>
</head>

<body>

    <div class="container">
        <a href="{% url 'home' %}" class="top-link">← Back to Home</a>

        <ul>
            {% for category_id, category_name in categories.items %}
            <li>
                <strong>{{ category_name }}</strong><br>
                <a href="{% url 'edit' category_id=category_id %}" class="action-link">
                    Delete
                </a>
                <a href="{% url 'rename' category_id=category_id %}" class="action-link">
                    Rename
                </a>
            </li>
            {% endfor %}
        </ul>

        <a href="{% url 'add' %}" class="add-link">+ Add Category</a>
    </div>

</body>

</html>
